apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: application-management-root
  namespace: argocd
spec:
  description: Project for managing applications
  sourceRepos:
    - 'https://github.com/ssah-blr/argocd.git'
    - 'https://github.com/ssah-blr/fibonacci-app-k8s.git'
    - 'https://github.com/ssah-blr/helm-python-app.git'
  destinations:
    - namespace: '*'
      server: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceBlacklist:
    - group: ''
      kind: Event
  syncWindows: []
