apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-90"
  finalizers:
    - resources-finalizers.argocd.argoproj.io
  labels:
    app: kyverno-policies
spec:
  project: cluster-management-root
  destination:
    namespace: kyverno-policies
    server: 'https://kubernetes.default.svc'
  source:
    chart: kyverno
    helm:
      releaseName: kyverno
    repoURL: https://kyverno.github.io/kyverno/
    targetRevision: 2.6.0
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - Validate=true
      - PrunePropagationPolicy=foreground
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
    retry:
      limit: 2
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
