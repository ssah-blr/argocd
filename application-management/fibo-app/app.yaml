apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fibonacci-series-webapp
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: in-cluster
            namespace: app-dev
            name: fapp-dev
            valuesFile: values-dev.yaml
          - cluster: in-cluster
            namespace: app-qa
            name: fapp-qa
            valuesFile: values-qa.yaml
  template:
    metadata:
      name: "{{name}}"
    spec:
      project: application-management-root
      source:
        repoURL: https://github.com/ssah-blr/helm-python-app.git
        targetRevision: main
        path: .
        helm:
          releaseName: "{{name}}"
          valueFiles:
            - "{{valuesFile}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - Validate=true
          - PrunePropagationPolicy=foreground
          - CreateNamespace=true
          - PruneLast=true
        retry:
          limit: 2
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
